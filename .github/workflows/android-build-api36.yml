name: Build and Release Android APK (API 36)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# 避免同一个提交触发多次重复构建
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Extract version from package.json
        id: pkg_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 36

      - name: Install NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.2.12479018" "cmake;3.22.1"

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Generate Debug Keystore
        run: |
          cd android/app
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug, O=Android, C=US"

      - name: Build Android APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug -PprojVersionName=${{ steps.pkg_version.outputs.VERSION }} -PprojVersionCode=${{ github.run_number }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-v${{ steps.pkg_version.outputs.VERSION }}
          path: android/app/build/outputs/apk/debug/*.apk

      - name: Create GitHub Release
        # 只有在推送 tag 时才执行 Release 步骤
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/*.apk
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ### Echo v${{ steps.pkg_version.outputs.VERSION }} 更新说明
            
            这是由 GitHub Actions 自动生成的发布版本。
            
            - **应用版本**: ${{ steps.pkg_version.outputs.VERSION }}
            - **Build Number**: ${{ github.run_number }}
            
            - **arm64-v8a**: 现代 64 位手机
            - **armeabi-v7a**: 旧款 32 位手机
            - **universal**: 全架构通用包
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
