<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="Echo - Next-gen Visual Novel Engine with LLM Integration" />
    <link rel="apple-touch-icon" href="/icon-512.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <title>Echo // 回声系统</title>
  </head>
  <body style="background-color: #0a0a0a;">
    <div id="root">
      <!-- 极速首屏占位符：与 React Loading 组件视觉完全同步 -->
      <div id="splash-screen" style="position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0a0a0a; z-index: 9999; transition: opacity 0.8s ease-in-out; color: white;">
        <div style="display: flex; align-items: center; gap: 16px;">
          <h1 style="font-family: serif; font-weight: 300; font-size: 48px; letter-spacing: 0.2em; margin: 0;">ECHO</h1>
          <div style="border-left: 1px solid rgba(255,255,255,0.2); padding-left: 16px; margin-top: 8px; font-family: sans-serif; font-size: 10px; letter-spacing: 0.5em; color: rgba(255,255,255,0.3); line-height: 1.4; text-transform: uppercase;">
            Visual Novel<br/>Engine
          </div>
        </div>
        <div style="margin-top: 40px; width: 192px; height: 1px; background: rgba(255,255,255,0.1); position: relative; overflow: hidden;">
          <div style="position: absolute; width: 96px; height: 100%; background: rgba(255,255,255,0.3); animation: loading-anim 1.8s infinite ease-in-out;"></div>
        </div>
        <p style="margin-top: 16px; font-size: 10px; color: rgba(255,255,255,0.2); font-family: sans-serif; letter-spacing: 0.3em; text-transform: uppercase;">
          Calibrating Soul...
        </p>
        <style>
          @keyframes loading-anim {
            0% { transform: translateX(-96px); }
            100% { transform: translateX(192px); }
          }
          body { background: #0a0a0a !important; margin: 0; }
        </style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
