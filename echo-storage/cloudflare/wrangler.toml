name = "echo"
main = "worker.ts"
compatibility_date = "2025-01-01"

[assets]
directory = "../../dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[[r2_buckets]]
binding = "ECHO_R2"
bucket_name = "echo-storage"

[[d1_databases]]
binding = "ECHO_DB"
database_name = "echo-db"
database_id = "c60eb168-95c0-4576-a0b3-a688a1226063"
