name = "echo"
main = "worker.ts"
compatibility_date = "2025-01-01"

# 前端静态文件由 Workers Assets 自动 serve
[assets]
directory = "../../dist"
binding = "ASSETS"

[[kv_namespaces]]
binding = "ECHO_KV"
id = "PLACEHOLDER_KV_ID"

[[d1_databases]]
binding = "ECHO_DB"
database_name = "echo-db"
database_id = "PLACEHOLDER_D1_ID"
