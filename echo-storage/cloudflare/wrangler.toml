name = "echo"
main = "worker.ts"
compatibility_date = "2025-01-01"

[assets]
directory = "../../dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[[kv_namespaces]]
binding = "ECHO_KV"
id = "PLACEHOLDER_KV_ID"

[[d1_databases]]
binding = "ECHO_DB"
database_name = "echo-db"
database_id = "PLACEHOLDER_D1_ID"
